general {
    lock_cmd = /home/sawmer/.config/scripts/lockscreen.sh                       # lock screen
    unlock_cmd = notify-send "Unlocked"       # notification after unlock
    before_sleep_cmd = /home/sawmer/.config/scripts/lockscreen.sh               # lock before sleep
    after_sleep_cmd = notify-send "Awake!"    # notification after wake
    ignore_dbus_inhibit = false               # respect dbus inhibit requests (e.g., firefox, steam)
    ignore_systemd_inhibit = false            # respect systemd inhibit requests
}

# Lock screen after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = /home/sawmer/.config/scripts/lockscreen.sh
}

# Turn off screen after 10 minutes of inactivity
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 20 minutes of inactivity
listener {
    timeout = 1200
    on-timeout = systemctl suspend
}